name: Deploy App 
on:
    pull_request:
        types:
        - labeled
        branches:
        - main
        - release/testing

permissions:
    contents: read
    pull-requests: write
    issues: write

jobs:
    check:
        # 起動条件: プルリクエストが "deploy" ラベルを持っている場合にのみ実行
        if: >-
            github.event.pull_request.draft == false
            && contains(github.event.pull_request.labels.*.name, 'deploy')
        runs-on: ubuntu-slim
        timeout-minutes: 10
        outputs:
            build_for_ios: ${{ steps.build_number.outputs.VERSION_CODE }}
            build_for_android: ${{ steps.build_number.outputs.VERSION_CODE }}
        steps:
            - uses: actions/checkout@v4
            
            - name: Generate GitHub App token
              id: generate_token
              uses: actions/create-github-app-token@v2
              with:
                app-id: ${{ secrets.APP_ID }}
                private-key: ${{ secrets.PRIVATE_KEY }}
                owner: ${{ github.repository_owner }}
                repositories: ${{ github.event.repository.name }}

            - name: ビルド番号の生成
              id: build_number
              run: |
                VERSION_CODE=$(expr $(date +%s) / 10)
                echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
                echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
            - name: Generate list using Markdown
              run: |
                echo "This is the lead in sentence for the list" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY # this is a blank line
                echo "- Lets add a bullet point" >> $GITHUB_STEP_SUMMARY
                echo "- Lets add a second bullet point" >> $GITHUB_STEP_SUMMARY
                echo "- How about a third one?" >> $GITHUB_STEP_SUMMARY
            - name: Overwrite Markdown
              run: |
                echo "Adding some Markdown content" >> $GITHUB_STEP_SUMMARY
                echo "There was an error, we need to clear the previous Markdown with some new content." > $GITHUB_STEP_SUMMARY
            - name: Get PR description
              id: get_pr_description
              run: |
                DESCRIPTION=$(gh pr view ${{ github.event.pull_request.number }} --json body --jq .body)
                REPLACED_DESCRIPTION=$(echo $DESCRIPTION | sed 's/\n/;;;:::;;;/g')
                echo "replaced_description=$REPLACED_DESCRIPTION" >> $GITHUB_OUTPUT
              env:
                GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
              
            - name: Create comment file
            #   if: ${{ steps.test.outcome == 'failure' && inputs.enable_pr_comment == true }}
              if: ${{ steps.build_number.outcome == 'failure' }}
              run: |
                cat  << EOF > comment.md
                ## Test Failed
                The tests failed. Please check the logs for more information.
                https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
                EOF
            - name: Create comment file
              if: ${{ steps.build_number.outcome == 'success' }}
              run: |
                cat  << EOF > comment.md
                ## Test Passed
                The tests passed successfully.
                VERSION_CODE: ${{ steps.build_number.outputs.VERSION_CODE }}
                https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
                EOF
            - name: Create PR comment
            #   if: ${{ steps.test.outcome == 'failure' && inputs.enable_pr_comment == true }}
              run: |
                gh pr comment ${{ github.event.pull_request.number }} --body-file comment.md
              env:
                GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
