name: Deploy App 
on:
    pull_request:
        types:
        - labeled
        branches:
        - main
        - release/testing

permissions:
    contents: read
    pull-requests: write

jobs:
    check:
        # 起動条件: プルリクエストが "deploy" ラベルを持っている場合にのみ実行
        if: >-
            github.event.pull_request.draft == false
            && contains(github.event.pull_request.labels.*.name, 'deploy')
        runs-on: ubuntu-slim
        timeout-minutes: 10
        outputs:
            build_for_ios: ${{ steps.build_number.outputs.VERSION_CODE }}
            build_for_android: ${{ steps.build_number.outputs.VERSION_CODE }}
        steps:
            - uses: actions/checkout@v4
            
            - name: Generate GitHub App token
              id: generate_token
              uses: actions/create-github-app-token@v2
              with:
                app-id: ${{ secrets.APP_ID }}
                private-key: ${{ secrets.PRIVATE_KEY }}
                owner: ${{ github.repository_owner }}

            - name: ビルド番号の生成
              id: build_number
              run: |
                VERSION_CODE=$(expr $(date +%s) / 10)
                echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
                echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
            - name: Create comment file
            #   if: ${{ steps.test.outcome == 'failure' && inputs.enable_pr_comment == true }}
              run: |
                cat  << EOF > comment.md
                ## Test Failed
                The tests failed. Please check the logs for more information.
                https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
                EOF
            - name: Create PR comment
            #   if: ${{ steps.test.outcome == 'failure' && inputs.enable_pr_comment == true }}
              run: |
                gh pr comment ${{ github.event.number }} --body-file comment.md
              env:
                GH_TOKEN: ${{ steps.generate_token.outputs.token }}
